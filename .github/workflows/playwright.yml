name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Test Suite
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Create artifact directories
        run: mkdir -p test-results allure-results screenshots videos traces

      - name: Run Playwright + Pytest suite
        id: run_tests
        run: pytest --browser chromium
        env:
          HEADLESS: "true"
          BASE_URL: "https://books.toscrape.com"
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline --no-progress
          allure generate allure-results --clean -o allure-report

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: test-results/
          retention-days: 30

      - name: Upload Allure results (raw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload Allure report (generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: videos/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload trace files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: traces/
          if-no-files-found: ignore
          retention-days: 30

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
