[pytest]
; Base URL for the application under test
addopts =
    -v
    --tb=short
    --html=test-results/report.html
    --self-contained-html
    --alluredir=allure-results
    --reruns 1
    --reruns-delay 2

testpaths = tests

; Custom markers for test categorization
markers =
    smoke: Quick smoke tests for critical functionality
    regression: Full regression suite
    navigation: Navigation and routing tests
    data_consistency: Data integrity and consistency checks
    links: Hyperlink validation tests
    images: Image and media validation tests
    ui: General UI validation tests

; Console output
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

filterwarnings =
    ignore::DeprecationWarning
